<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Service - OG Productions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="card mx-auto shadow" style="max-width: 500px;">
        <div class="card-header bg-primary text-white text-center py-3">
            <h4 class="mb-1">📋 Request: {{ service.name }}</h4>
            <span class="badge bg-light text-dark fs-6">${{ service.price }}</span>
        </div>
        <div class="card-body p-4">
            {% if messages %}
                {% for m in messages %}
                    <div class="alert alert-{{ m.tags }} alert-dismissible fade show">
                        {{ m }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="post" action="">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="client_name" class="form-control" required placeholder="Your Name">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email Address</label>
                    <input type="email" name="client_email" class="form-control" required placeholder="you@email.com">
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Phone Number</label>
                    <input type="tel" name="client_phone" class="form-control" required placeholder="+1 234 567 8900">
                </div>
                <button type="submit" class="btn btn-success w-100 btn-lg">✅ Submit Request</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
